<!-- LIGHTBOX -->
<div id="lightbox">
  <span class="close">&times;</span>
  <span class="nav left">&#10094;</span>
  <span class="nav right">&#10095;</span>
  <img id="lightbox-img" src="">
</div>


<script>
  // ----- LIGHTBOX -----
const images = document.querySelectorAll('.gallery .item img');
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');

const prevBtn = document.querySelector('#lightbox .nav.left');
const nextBtn = document.querySelector('#lightbox .nav.right');
const closeBtn = document.querySelector('#lightbox .close');

let currentIndex = 0;

// Avaa lightbox klikkaamalla kuvaa
images.forEach((img, index) => {
  img.addEventListener('click', () => {
    currentIndex = index;
    lightboxImg.src = img.src;
    lightbox.classList.add('active');

    // Poista zoom kun avataan
    lightboxImg.classList.remove('zoomed');
  });
});

// Näytä kuva (selailu)
function showImage(index) {
  if (index < 0) index = images.length - 1;
  if (index >= images.length) index = 0;
  currentIndex = index;
  lightboxImg.src = images[currentIndex].src;

  // Poista zoom aina kun vaihdetaan kuvaa
  lightboxImg.classList.remove('zoomed');
}

// Nuoli vasemmalle
prevBtn.addEventListener('click', () => {
  showImage(currentIndex - 1);
});

// Nuoli oikealle
nextBtn.addEventListener('click', () => {
  showImage(currentIndex + 1);
});

// Sulje painamalla X
closeBtn.addEventListener('click', () => {
  lightbox.classList.remove('active');
  lightboxImg.classList.remove('zoomed');
});

// Sulje klikkaamalla taustaa
lightbox.addEventListener('click', (e) => {
  if (e.target === lightbox) {
    lightbox.classList.remove('active');
    lightboxImg.classList.remove('zoomed');
  }
});

// Näppäimet: nuoli vasen/oikea ja Esc
document.addEventListener('keydown', (e) => {
  if (lightbox.classList.contains('active')) {
    if (e.key === 'ArrowLeft') showImage(currentIndex - 1);
    if (e.key === 'ArrowRight') showImage(currentIndex + 1);
    if (e.key === 'Escape') {
      lightbox.classList.remove('active');
      lightboxImg.classList.remove('zoomed');
    }
  }
});

// ----- ZOOM (klikattaessa lightbox-kuvaa) -----
lightboxImg.addEventListener('click', () => {
  lightboxImg.classList.toggle('zoomed');
});

// ----- MASONRY (grid korkeus laskenta) -----
const items = document.querySelectorAll('.gallery .item');

items.forEach(item => {
  const img = item.querySelector('img');

  img.addEventListener('load', () => {
    const rowHeight = parseInt(getComputedStyle(document.querySelector('.gallery')).getPropertyValue('grid-auto-rows'));
    const rowGap = parseInt(getComputedStyle(document.querySelector('.gallery')).getPropertyValue('gap'));
    const height = img.getBoundingClientRect().height;

    const rowSpan = Math.ceil((height + rowGap) / (rowHeight + rowGap));
    item.style.gridRowEnd = `span ${rowSpan}`;
  });
});
</script>
